<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asurada Dashboard</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --text: #e0e0e8;
    --text-dim: #7a7a8e;
    --accent: #6c5ce7;
    --accent-dim: #4a3db5;
    --green: #2ecc71;
    --yellow: #f1c40f;
    --red: #e74c3c;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }
  header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 {
    font-size: 1.25rem;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  header h1 span { color: var(--accent); }
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 500;
    background: rgba(46, 204, 113, 0.1);
    color: var(--green);
  }
  .status-badge.offline {
    background: rgba(231, 76, 60, 0.1);
    color: var(--red);
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
  }
  .status-badge.offline .status-dot { background: var(--red); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
    gap: 16px;
    padding: 24px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .card h2 {
    font-size: 0.85rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    margin-bottom: 16px;
  }
  .metric {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .metric:last-child { border-bottom: none; }
  .metric-label { color: var(--text-dim); font-size: 0.9rem; }
  .metric-value { font-weight: 600; font-variant-numeric: tabular-nums; }

  .perception-item {
    padding: 10px 12px;
    margin-bottom: 8px;
    background: rgba(255,255,255,0.02);
    border-radius: 6px;
    border-left: 3px solid var(--accent-dim);
  }
  .perception-item .name {
    font-weight: 600;
    font-size: 0.9rem;
    margin-bottom: 4px;
  }
  .perception-item .output {
    font-size: 0.8rem;
    color: var(--text-dim);
    white-space: pre-wrap;
    max-height: 120px;
    overflow-y: auto;
  }

  .event-log {
    max-height: 300px;
    overflow-y: auto;
    font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
    font-size: 0.78rem;
  }
  .event-entry {
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    color: var(--text-dim);
  }
  .event-entry .time { color: var(--accent); margin-right: 8px; }
  .event-entry .type { color: var(--text); font-weight: 500; }

  .messages {
    max-height: 400px;
    overflow-y: auto;
  }
  .msg {
    padding: 10px 12px;
    margin-bottom: 8px;
    background: rgba(255,255,255,0.02);
    border-radius: 6px;
  }
  .msg .meta {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .msg .meta .from { color: var(--accent); font-weight: 600; }
  .msg .text { font-size: 0.88rem; }

  .msg-input {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .msg-input input {
    flex: 1;
    padding: 8px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 0.88rem;
    outline: none;
  }
  .msg-input input:focus { border-color: var(--accent); }
  .msg-input button {
    padding: 8px 16px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 500;
    font-size: 0.88rem;
  }
  .msg-input button:hover { background: var(--accent-dim); }

  .empty { color: var(--text-dim); font-size: 0.85rem; font-style: italic; }
  .wide { grid-column: 1 / -1; }

  @media (max-width: 768px) {
    .grid { grid-template-columns: 1fr; padding: 12px; }
    header { padding: 16px; }
  }
</style>
</head>
<body>

<header>
  <h1><span>Asurada</span> Dashboard</h1>
  <div class="status-badge" id="status-badge">
    <div class="status-dot"></div>
    <span>connecting...</span>
  </div>
</header>

<div class="grid">
  <!-- Agent Info -->
  <div class="card">
    <h2>Agent</h2>
    <div id="agent-info">
      <div class="metric">
        <span class="metric-label">Name</span>
        <span class="metric-value" id="agent-name">—</span>
      </div>
      <div class="metric">
        <span class="metric-label">Instance</span>
        <span class="metric-value" id="agent-instance">—</span>
      </div>
      <div class="metric">
        <span class="metric-label">Uptime</span>
        <span class="metric-value" id="agent-uptime">—</span>
      </div>
    </div>
  </div>

  <!-- Loop -->
  <div class="card">
    <h2>OODA Loop</h2>
    <div class="metric">
      <span class="metric-label">Status</span>
      <span class="metric-value" id="loop-status">—</span>
    </div>
    <div class="metric">
      <span class="metric-label">Cycles</span>
      <span class="metric-value" id="loop-cycles">—</span>
    </div>
  </div>

  <!-- Lanes -->
  <div class="card">
    <h2>Lanes</h2>
    <div class="metric">
      <span class="metric-label">Active</span>
      <span class="metric-value" id="lanes-active">—</span>
    </div>
    <div class="metric">
      <span class="metric-label">Queued</span>
      <span class="metric-value" id="lanes-queued">—</span>
    </div>
    <div class="metric">
      <span class="metric-label">Completed</span>
      <span class="metric-value" id="lanes-completed">—</span>
    </div>
  </div>

  <!-- Perception -->
  <div class="card">
    <h2>Perception</h2>
    <div id="perception-list">
      <p class="empty">Loading...</p>
    </div>
  </div>

  <!-- Memory Index -->
  <div class="card">
    <h2>Memory Index</h2>
    <div id="index-stats">
      <p class="empty">Loading...</p>
    </div>
  </div>

  <!-- Event Stream -->
  <div class="card">
    <h2>Event Stream</h2>
    <div class="event-log" id="event-log">
      <p class="empty">Waiting for events...</p>
    </div>
  </div>

  <!-- Messages -->
  <div class="card wide">
    <h2>Messages</h2>
    <div class="messages" id="messages-list">
      <p class="empty">No messages yet</p>
    </div>
    <div class="msg-input">
      <input type="text" id="msg-input" placeholder="Send a message..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<script>
const BASE = location.origin;
const API_KEY = new URLSearchParams(location.search).get('key') || '';
const headers = API_KEY ? { 'Authorization': `Bearer ${API_KEY}` } : {};

function fmt(ms) {
  const s = Math.floor(ms / 1000);
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s / 60) + 'm ' + (s % 60) + 's';
  const h = Math.floor(s / 3600);
  return h + 'h ' + Math.floor((s % 3600) / 60) + 'm';
}

function time() {
  return new Date().toLocaleTimeString('en', { hour12: false });
}

async function fetchJSON(url) {
  try {
    const r = await fetch(BASE + url, { headers });
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

async function refreshStatus() {
  const data = await fetchJSON('/status');
  const badge = document.getElementById('status-badge');

  if (!data) {
    badge.className = 'status-badge offline';
    badge.querySelector('span').textContent = 'offline';
    return;
  }

  badge.className = 'status-badge';
  badge.querySelector('span').textContent = data.agent.running ? 'running' : 'stopped';

  document.getElementById('agent-name').textContent = data.agent.name;
  document.getElementById('agent-instance').textContent = data.agent.instanceId;
  document.getElementById('agent-uptime').textContent = fmt(data.agent.uptime);

  if (data.loop) {
    document.getElementById('loop-status').textContent = data.loop.running ? 'running' : 'stopped';
    document.getElementById('loop-cycles').textContent = data.loop.cycles;
  } else {
    document.getElementById('loop-status').textContent = 'not configured';
  }

  document.getElementById('lanes-active').textContent = data.lanes.running;
  document.getElementById('lanes-queued').textContent = data.lanes.queued;
  document.getElementById('lanes-completed').textContent = data.lanes.completed;
}

async function refreshPerception() {
  const data = await fetchJSON('/api/perception');
  const el = document.getElementById('perception-list');
  if (!data || !data.plugins.length) {
    el.innerHTML = '<p class="empty">No plugins active</p>';
    return;
  }

  // Also fetch full context for output
  const ctx = await fetchJSON('/context');
  const outputs = {};
  if (ctx?.context) {
    const regex = /<(\w[\w-]*)>\n([\s\S]*?)\n<\/\1>/g;
    let m;
    while ((m = regex.exec(ctx.context)) !== null) {
      outputs[m[1]] = m[2];
    }
  }

  el.innerHTML = data.plugins.map(p => `
    <div class="perception-item">
      <div class="name">${p.name} <span style="color:var(--text-dim);font-weight:normal;font-size:0.75rem">${p.category || ''}</span></div>
      <div class="output">${outputs[p.name] ? escapeHtml(outputs[p.name].slice(0, 500)) : '<span style="color:var(--text-dim)">no output</span>'}</div>
    </div>
  `).join('');
}

async function refreshIndex() {
  const data = await fetchJSON('/api/index/stats');
  const el = document.getElementById('index-stats');
  if (!data || data.total === 0) {
    el.innerHTML = '<p class="empty">No entries yet</p>';
    return;
  }

  const types = Object.entries(data)
    .filter(([k]) => k !== 'total')
    .sort((a, b) => (b[1] as number) - (a[1] as number));

  el.innerHTML = `
    <div class="metric">
      <span class="metric-label">Total entries</span>
      <span class="metric-value">${data.total}</span>
    </div>
    ${types.map(([type, count]) => `
      <div class="metric">
        <span class="metric-label">${type}</span>
        <span class="metric-value">${count}</span>
      </div>
    `).join('')}
  `;
}

async function refreshMessages() {
  const data = await fetchJSON('/api/messages?limit=20');
  const el = document.getElementById('messages-list');
  if (!data || !data.messages.length) {
    el.innerHTML = '<p class="empty">No messages yet</p>';
    return;
  }

  el.innerHTML = data.messages.reverse().map(m => `
    <div class="msg">
      <div class="meta">
        <span class="from">${escapeHtml(m.from)}</span>
        <span>${m.id}</span>
        ${m.replyTo ? `<span>↩${m.replyTo}</span>` : ''}
      </div>
      <div class="text">${escapeHtml(m.text)}</div>
    </div>
  `).join('');

  el.scrollTop = el.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;

  try {
    await fetch(BASE + '/api/message', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...headers },
      body: JSON.stringify({ from: 'user', text }),
    });
    input.value = '';
    setTimeout(refreshMessages, 300);
  } catch (err) {
    console.error('Send failed:', err);
  }
}

document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMessage();
});

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// SSE Event Stream
function connectSSE() {
  const url = BASE + '/api/events' + (API_KEY ? `?key=${API_KEY}` : '');
  const es = new EventSource(url);
  const log = document.getElementById('event-log');
  let first = true;

  es.onmessage = (e) => {
    if (first) {
      log.innerHTML = '';
      first = false;
    }

    try {
      const event = JSON.parse(e.data);
      const entry = document.createElement('div');
      entry.className = 'event-entry';
      entry.innerHTML = `<span class="time">${time()}</span><span class="type">${event.type || 'event'}</span> ${JSON.stringify(event.data || '').slice(0, 120)}`;
      log.appendChild(entry);

      // Auto-scroll
      log.scrollTop = log.scrollHeight;

      // Keep max 100 entries
      while (log.children.length > 100) {
        log.removeChild(log.firstChild);
      }

      // Refresh status on cycle events
      if (event.type === 'action:cycle') {
        setTimeout(refreshStatus, 500);
      }
    } catch {}
  };

  es.onerror = () => {
    setTimeout(connectSSE, 5000);
  };
}

// Initial load
refreshStatus();
refreshPerception();
refreshIndex();
refreshMessages();
connectSSE();

// Periodic refresh
setInterval(refreshStatus, 10_000);
setInterval(refreshPerception, 30_000);
setInterval(refreshIndex, 60_000);
setInterval(refreshMessages, 15_000);
</script>
</body>
</html>
