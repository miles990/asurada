<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asurada Chat</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --text: #e0e0e8;
    --text-dim: #7a7a8e;
    --accent: #6c5ce7;
    --accent-dim: #4a3db5;
    --green: #2ecc71;
    --red: #e74c3c;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  header h1 {
    font-size: 1.15rem;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  header h1 span { color: var(--accent); }
  header nav a {
    color: var(--text-dim);
    text-decoration: none;
    font-size: 0.85rem;
    margin-left: 16px;
  }
  header nav a:hover { color: var(--text); }
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 500;
    background: rgba(46, 204, 113, 0.1);
    color: var(--green);
  }
  .status-badge.offline {
    background: rgba(231, 76, 60, 0.1);
    color: var(--red);
  }
  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
  }
  .status-badge.offline .status-dot { background: var(--red); }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px;
  }
  .msg {
    max-width: 720px;
    margin: 0 auto 12px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .msg.from-user {
    border-left: 3px solid var(--accent);
  }
  .msg.from-agent {
    border-left: 3px solid var(--green);
  }
  .msg .meta {
    font-size: 0.72rem;
    color: var(--text-dim);
    margin-bottom: 4px;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .msg .meta .from {
    font-weight: 600;
    color: var(--accent);
  }
  .msg.from-agent .meta .from {
    color: var(--green);
  }
  .msg .meta .reply-to {
    color: var(--text-dim);
    font-size: 0.7rem;
  }
  .msg .text {
    font-size: 0.9rem;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .empty {
    color: var(--text-dim);
    font-size: 0.9rem;
    text-align: center;
    padding: 40px;
  }

  .input-bar {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .input-wrap {
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    gap: 8px;
  }
  .input-wrap input {
    flex: 1;
    padding: 10px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 0.9rem;
    outline: none;
  }
  .input-wrap input:focus { border-color: var(--accent); }
  .input-wrap button {
    padding: 10px 20px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    font-weight: 500;
    font-size: 0.9rem;
  }
  .input-wrap button:hover { background: var(--accent-dim); }
  .input-wrap button:disabled { opacity: 0.5; cursor: default; }

  @media (max-width: 768px) {
    header { padding: 12px 16px; }
    .messages { padding: 12px 16px; }
    .input-bar { padding: 12px 16px; }
  }
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:12px">
    <h1><span>Asurada</span> Chat</h1>
    <div class="status-badge" id="status-badge">
      <div class="status-dot"></div>
      <span>connecting...</span>
    </div>
  </div>
  <nav>
    <a href="/dashboard">Dashboard</a>
  </nav>
</header>

<div class="messages" id="messages"></div>

<div class="input-bar">
  <div class="input-wrap">
    <input type="text" id="msg-input" placeholder="Send a message..." autofocus />
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
const BASE = location.origin;
const API_KEY = new URLSearchParams(location.search).get('key') || '';
const headers = API_KEY ? { 'Authorization': `Bearer ${API_KEY}` } : {};
let agentName = 'agent';

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function fetchJSON(url) {
  try {
    const r = await fetch(BASE + url, { headers });
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

async function checkStatus() {
  const data = await fetchJSON('/status');
  const badge = document.getElementById('status-badge');
  if (!data) {
    badge.className = 'status-badge offline';
    badge.querySelector('span').textContent = 'offline';
    return;
  }
  badge.className = 'status-badge';
  badge.querySelector('span').textContent = data.agent.running ? 'running' : 'stopped';
  agentName = data.agent.name || 'agent';
}

async function refreshMessages() {
  const data = await fetchJSON('/api/messages?limit=50');
  const el = document.getElementById('messages');
  if (!data || !data.messages || !data.messages.length) {
    el.innerHTML = '<p class="empty">No messages yet. Say hello!</p>';
    return;
  }

  const msgs = data.messages.reverse();
  el.innerHTML = msgs.map(m => {
    const isUser = m.from === 'user' || m.from === 'alex';
    const cls = isUser ? 'from-user' : 'from-agent';
    const time = m.id || '';
    return `
      <div class="msg ${cls}">
        <div class="meta">
          <span class="from">${escapeHtml(m.from)}</span>
          <span>${time}</span>
          ${m.replyTo ? `<span class="reply-to">&larr; ${m.replyTo}</span>` : ''}
        </div>
        <div class="text">${escapeHtml(m.text)}</div>
      </div>
    `;
  }).join('');

  el.scrollTop = el.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const btn = document.getElementById('send-btn');
  const text = input.value.trim();
  if (!text) return;

  btn.disabled = true;
  try {
    await fetch(BASE + '/api/message', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...headers },
      body: JSON.stringify({ from: 'user', text }),
    });
    input.value = '';
    setTimeout(refreshMessages, 300);
  } catch (err) {
    console.error('Send failed:', err);
  }
  btn.disabled = false;
  input.focus();
}

document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// SSE for real-time updates
function connectSSE() {
  const url = BASE + '/api/events' + (API_KEY ? `?key=${API_KEY}` : '');
  const es = new EventSource(url);
  es.onmessage = (e) => {
    try {
      const event = JSON.parse(e.data);
      if (event.type === 'action:message' || event.type === 'action:chat') {
        setTimeout(refreshMessages, 300);
      }
    } catch {}
  };
  es.onerror = () => { setTimeout(connectSSE, 5000); };
}

// Init
checkStatus();
refreshMessages();
connectSSE();
setInterval(checkStatus, 15_000);
setInterval(refreshMessages, 10_000);
</script>
</body>
</html>
